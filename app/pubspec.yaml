name: dailyforge
description: Workout + Yoga + Breathwork app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.0

  # HTTP & API
  http: ^1.2.0

  # Local Storage
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.0.0

  # UI Components
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # Icons
  lucide_icons: ^0.257.0

  # Utils
  intl: ^0.19.0

  # 3D body map (S10-T5a)
  interactive_3d: ^2.0.3

  # S14-T5 AMENDMENT-1 D12: hold screen on during active sessions.
  wakelock_plus: ^1.2.8

  # S14-T6 §6.1.2: native share sheet for the post-session summary card.
  share_plus: ^10.1.0
  # Required by share_plus for the temp PNG paths.
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/male_anatomy_split.glb
